name: QEC lib

on:
  workflow_call:
    inputs:
      cache_key_suffix:
        type: string
        default: ''
        required: false
      cudaq_repo:
        type: string
        default: ''
        required: false
      cudaq_ref:
        type: string
        default: ''
        required: false

jobs:
  build-and-test:
    name: Build and test
    strategy:
      fail-fast: false
      matrix:
        platform: ['amd64', 'arm64']
        cuda_version: ['12.6', '13.0']
    runs-on: ${{ startsWith(github.repository, 'NVIDIA/cudaqx') && format('linux-{0}-cpu8', matrix.platform) || 'ubuntu-latest' }}
    container:
      image: ghcr.io/nvidia/cuda-quantum-devcontainer:${{ matrix.platform }}-cu${{ matrix.cuda_version }}-gcc12-main
      # SYS_NICE: the default seccomp profile only admits the NUMA memory-policy
      # syscalls (set_mempolicy/get_mempolicy/mbind) with this capability, which
      # the hardware-affinity tests exercise.
      options: --cap-add=SYS_NICE
    permissions:
      actions: write
      contents: read
      pull-requests: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          set-safe-directory: true

      - name: Configure
        id: config
        run: |
          cuda_major=`echo ${{ matrix.cuda_version }} | cut -d . -f1`
          echo "cuda_major=$cuda_major" >> $GITHUB_OUTPUT

      # ========================================================================
      # CUDA Quantum build
      # ========================================================================

      - name: Get required CUDAQ version
        id: get-cudaq-version
        uses: ./.github/actions/get-cudaq-version
        with:
          repo: ${{ inputs.cudaq_repo }}
          ref: ${{ inputs.cudaq_ref }}

      - name: Get CUDAQ build
        uses: ./.github/actions/get-cudaq-build
        with:
          repo: ${{ steps.get-cudaq-version.outputs.repo }}
          ref: ${{ steps.get-cudaq-version.outputs.ref }}
          token: ${{ secrets.CUDAQ_ACCESS_TOKEN }}
          cache-key-suffix: ${{ inputs.cache_key_suffix }}
          platform: ${{ matrix.platform }}-cu${{ steps.config.outputs.cuda_major }}

      # ========================================================================
      # Build library
      # ========================================================================
      - name: Install build requirements
        run: |
          apt update
          apt install -y --no-install-recommends gfortran libblas-dev wget jq

      - name: Install TensorRT (amd64)
        if: matrix.platform == 'amd64'
        run: |
          apt update
          apt-cache search tensorrt | awk '{print "Package: "$1"\nPin: version *+cuda${{ matrix.cuda_version }}\nPin-Priority: 1001\n"}' | tee /etc/apt/preferences.d/tensorrt-cuda${{ matrix.cuda_version }}.pref > /dev/null
          apt install -y tensorrt-dev

      - name: Install TensorRT (arm64)
        if: matrix.platform == 'arm64' && !startsWith(matrix.cuda_version, '12')
        run: |
          apt update
          apt-cache search tensorrt | awk '{print "Package: "$1"\nPin: version *+cuda13.0\nPin-Priority: 1001\n"}' | tee /etc/apt/preferences.d/tensorrt-cuda13.0.pref > /dev/null
          apt install -y tensorrt-dev

      - name: Build
        id: build
        uses: ./.github/actions/build-lib
        with:
          lib: "qec"
          cuda_version: ${{ matrix.cuda_version }}
          cache-key-suffix: ${{ inputs.cache_key_suffix }}
          save-ccache: true
          platform: ${{ matrix.platform }}
          cudaq-repo: ${{ steps.get-cudaq-version.outputs.repo }}
          cudaq-ref: ${{ steps.get-cudaq-version.outputs.ref }}
      # ========================================================================
      # Run tests
      # ========================================================================

      - name: Run tests
        run: cmake --build ${{ steps.build.outputs.build-dir }} --target run_tests

      # ========================================================================
      # Run python tests
      # ========================================================================
 
      - name: Install python requirements
        shell: bash
        run: |
          # Install the correct torch first.
          cuda_no_dot=$(echo ${{ matrix.cuda_version }} | sed 's/\.//')
          pip install torch==2.9.0 --index-url https://download.pytorch.org/whl/cu${cuda_no_dot}
          pip install numpy pytest onnxscript cuquantum-cu${{ steps.config.outputs.cuda_major }} quimb opt_einsum cotengra nvidia-cublas "cuquantum-python-cu${{ steps.config.outputs.cuda_major }}>=26.3.0"
          # The following tests are needed for docs/sphinx/examples/qec/python/tensor_network_decoder.py.
          if [ "$(uname -m)" == "x86_64" ]; then
              # Stim is not currently available on manylinux ARM wheels, so only
              # install for x86_64.
              pip install stim beliefmatching
          fi

      - name: Run Python tests
        run: cmake --build ${{ steps.build.outputs.build-dir }} --target run_python_tests

      # ========================================================================
      # Run example tests
      # ========================================================================

      - name: Run example tests
        run: bash scripts/ci/test_examples.sh qec

      # ========================================================================
      # Upload build artifacts for GPU tests
      # ========================================================================
      - name: Create artifact archive
        run: |
          tar czf /tmp/qec-build-artifacts.tar.gz \
            /cudaq-install \
            /tmp/cudaq-realtime \
            $GITHUB_WORKSPACE/libs/qec/unittests/decoders/realtime/data \
            $GITHUB_WORKSPACE/${{ steps.build.outputs.build-dir }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: qec-build-${{ matrix.platform }}-cu${{ matrix.cuda_version }}
          path: /tmp/qec-build-artifacts.tar.gz
          retention-days: 1

  # ==========================================================================
  # GPU Tests - Run on GPU runners (uses build artifacts from build-and-test)
  # ==========================================================================
  gpu-test:
    name: GPU tests
    needs: build-and-test
    strategy:
      fail-fast: false
      matrix:
        platform: ['amd64', 'arm64']
        cuda_version: ['12.6', '13.0']
    runs-on: ${{ startsWith(github.repository, 'NVIDIA/cudaqx') && format('linux-{0}-gpu-a100-latest-1', matrix.platform) || 'ubuntu-latest' }}
    container:
      image: ghcr.io/nvidia/cuda-quantum-devcontainer:${{ matrix.platform }}-cu${{ matrix.cuda_version }}-gcc12-main
      env:
        NVIDIA_VISIBLE_DEVICES: ${{ env.NVIDIA_VISIBLE_DEVICES }}
    permissions:
      actions: read
      contents: read
    steps:
      - name: Install git for LFS
        shell: bash
        run: |
          apt update
          apt install -y --no-install-recommends git git-lfs

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          set-safe-directory: true
          lfs: true # download assets file(s) for TRT tests

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: qec-build-${{ matrix.platform }}-cu${{ matrix.cuda_version }}
          path: /tmp

      - name: Extract build artifacts
        run: |
          tar xzf /tmp/qec-build-artifacts.tar.gz -C /

      - name: Configure
        id: config
        run: |
          cuda_major=$(echo ${{ matrix.cuda_version }} | cut -d . -f1)
          echo "cuda_major=$cuda_major" >> $GITHUB_OUTPUT

      - name: Install cuStabilizer runtime
        run: |
          pip install --upgrade "cuquantum-python-cu${{ steps.config.outputs.cuda_major }}>=26.3.0"

      - name: Install TensorRT (C++, amd64)
        if: matrix.platform == 'amd64'
        run: |
          apt update
          apt-cache search tensorrt | awk '{print "Package: "$1"\nPin: version *+cuda${{ matrix.cuda_version }}\nPin-Priority: 1001\n"}' | tee /etc/apt/preferences.d/tensorrt-cuda${{ matrix.cuda_version }}.pref > /dev/null
          apt install -y tensorrt-dev

      - name: Install TensorRT (C++, arm64)
        if: matrix.platform == 'arm64' && !startsWith(matrix.cuda_version, '12')
        run: |
          apt update
          apt-cache search tensorrt | awk '{print "Package: "$1"\nPin: version *+cuda13.0\nPin-Priority: 1001\n"}' | tee /etc/apt/preferences.d/tensorrt-cuda13.0.pref > /dev/null
          apt install -y tensorrt-dev

      - name: Install TensorRT (Python)
        if: matrix.platform != 'arm64' || !startsWith(matrix.cuda_version, '12')
        run: |
          pip install "tensorrt-cu${{ steps.config.outputs.cuda_major }}==10.13.*" "cuda_toolkit[cudart]==${{ matrix.cuda_version }}.*"

      - name: Install Python GPU test requirements
        run: |
          cuda_no_dot=$(echo ${{ matrix.cuda_version }} | sed 's/\.//')
          pip install torch==2.9.0 --index-url https://download.pytorch.org/whl/cu${cuda_no_dot}
          pip install numpy pytest cuquantum-cu${{ steps.config.outputs.cuda_major }} quimb opt_einsum cotengra nvidia-cublas "cuquantum-python-cu${{ steps.config.outputs.cuda_major }}>=26.3.0" "custabilizer-cu${{ steps.config.outputs.cuda_major }}>=0.3.0"

      - name: Run GPU C++ tests
        run: |
          cd $GITHUB_WORKSPACE/build_qec
          ctest --output-on-failure -R "GpuKernelsTest|test_realtime_decoding|test_realtime_pipeline|test_ai_decoder_quantized_onnx|DemSamplingGPU|TRTDecoder"

      - name: Run GPU Python tests
        run: |
          PYTHONPATH="/cudaq-install:$GITHUB_WORKSPACE/build_qec/python" \
            pytest -v libs/qec/python/tests/

  # ==========================================================================
  # Multi-GPU tests - decoder placement across >= 2 GPUs (uses build artifacts
  # from build-and-test).
  #
  # Keep this lane on the ARM L4 2-GPU runner while amd64 2-GPU runner
  # availability is too limited for PR CI. The runner metadata remains
  # structured so artifact and container selection stay arch-driven. Run CUDA
  # 13.0 only because the ARM CUDA 12.6 lane does not support TensorRT.
  # ==========================================================================
  multi-gpu-test:
    name: Multi-GPU tests (${{ matrix.runner.arch }}, CUDA ${{ matrix.cuda_version }})
    needs: build-and-test
    strategy:
      fail-fast: false
      matrix:
        runner:
          - arch: arm64
            label: linux-arm64-gpu-l4-latest-2
        cuda_version: ['13.0']
    runs-on: ${{ matrix.runner.label }}
    container:
      image: ghcr.io/nvidia/cuda-quantum-devcontainer:${{ matrix.runner.arch }}-cu${{ matrix.cuda_version }}-gcc12-main
      # SYS_NICE: see build-and-test.
      options: --cap-add=SYS_NICE
      env:
        NVIDIA_VISIBLE_DEVICES: ${{ env.NVIDIA_VISIBLE_DEVICES }}
    timeout-minutes: 45
    permissions:
      actions: read
      contents: read
    steps:
      - name: Install git for LFS
        shell: bash
        run: |
          apt update
          apt install -y --no-install-recommends git git-lfs

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          set-safe-directory: true
          lfs: true # TRT tests read the ONNX asset from the source tree

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: qec-build-${{ matrix.runner.arch }}-cu${{ matrix.cuda_version }}
          path: /tmp

      - name: Extract build artifacts
        run: |
          tar xzf /tmp/qec-build-artifacts.tar.gz -C /

      - name: Configure
        id: config
        run: |
          cuda_major=$(echo ${{ matrix.cuda_version }} | cut -d . -f1)
          echo "cuda_major=$cuda_major" >> $GITHUB_OUTPUT

      - name: Install cuStabilizer runtime
        run: |
          pip install --upgrade "cuquantum-python-cu${{ steps.config.outputs.cuda_major }}>=26.3.0"

      - name: Install TensorRT (C++, arm64)
        if: matrix.runner.arch == 'arm64' && !startsWith(matrix.cuda_version, '12')
        run: |
          apt update
          apt-cache search tensorrt | awk '{print "Package: "$1"\nPin: version *+cuda13.0\nPin-Priority: 1001\n"}' | tee /etc/apt/preferences.d/tensorrt-cuda13.0.pref > /dev/null
          apt install -y tensorrt-dev

      - name: Run multi-GPU C++ tests
        run: |
          cd $GITHUB_WORKSPACE/build_qec
          # The matching tests will be added separately; until then, this
          # command should not fail solely because the filter finds no tests.
          ctest --output-on-failure \
            -R "DecoderPool|HardwarePinningGpu|PoolRunsTwoTrt|CudaDeviceId"
