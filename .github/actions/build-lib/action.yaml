name: Build a CUDAQX library
description: Configure, build, and optionally cache a CUDA-QX library

inputs:
  lib:
    description: 'Library name to build. (e.g, all, qec or solvers)'
    required: true
  cuda_version:
    description: 'CUDA version to build against. (e.g, 12.6)'
    required: true
  cache-key-suffix:
    description: 'Unique identifier to append to cache keys.'
    default: ''
    required: false
  save-ccache:
    description: 'Indicates whether to save the compilation cache'
    default: 'false'
    required: false
  platform:
    description: 'Platform (amd64 or arm64)'
    default: ''
    required: true
  install-prefix:
    description: 'Install prefix'
    default: '$HOME/.cudaqx'
    required: false
  cudaq-prefix:
    description: 'CUDA-Q install prefix'
    default: '/cudaq-install'
    required: false
  cudaq-repo:
    description: "Optional source repository override for the QEC library's realtime CUDA-Q build."
    default: ''
    required: false
  cudaq-ref:
    description: "Optional source ref override for the QEC library's realtime CUDA-Q build."
    default: ''
    required: false
outputs:
  build-dir:
    description: 'Build dir.'
    value: ${{ steps.build-lib.outputs.build_dir }}


runs:
  using: "composite"
  steps:
    - name: Install requirements
      run: |
        apt update
        apt install -y --no-install-recommends ccache
      shell: bash

    - name: Compilation cache key
      id: ccache-key
      run: |
        echo "main=ccache-${{ inputs.lib }}-cu${{ inputs.cuda_version }}-gcc12-${{ inputs.platform }}" >> $GITHUB_OUTPUT
        if [[ -n "${{ inputs.cache-key-suffix }}" ]]; then
          echo "suffix=-${{ inputs.cache-key-suffix }}" >> $GITHUB_OUTPUT
        fi
      shell: bash

    - name: Try to restoring previous compilation cache
      id: restore-ccache
      uses: actions/cache/restore@v4
      with:
        fail-on-cache-miss: false
        path: /ccache-${{ inputs.lib }}
        key: ${{ steps.ccache-key.outputs.main }}${{ steps.ccache-key.outputs.suffix }}
        restore-keys: |
          ${{ steps.ccache-key.outputs.main }}

    - name: Install GitHub CLI
      run: bash .github/workflows/scripts/install_git_cli.sh
      shell: bash

    - name: Build library
      id: build-lib
      env:
        CCACHE_DIR: /ccache-${{ inputs.lib }}
        CUDAQ_REPO: ${{ inputs.cudaq-repo }}
        CUDAQ_REF: ${{ inputs.cudaq-ref }}
      run: |
        build_dir=build_${{ inputs.lib }}
        .github/actions/build-lib/build_${{ inputs.lib }}.sh "$build_dir" "${{ inputs.install-prefix }}" "${{ inputs.cudaq-prefix }}"
        echo "build_dir=$build_dir" >> $GITHUB_OUTPUT
      shell: bash

    # We need to delete previous cache entry otherwise the new one won't be stored
    - name: Delete previous main compilation cache
      if: steps.restore-ccache.outputs.cache-hit == 'true' && inputs.save-ccache == 'true'
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        bash .github/workflows/scripts/install_git_cli.sh
        gh cache delete \
          ${{ steps.ccache-key.outputs.main }}${{ steps.ccache-key.outputs.suffix }} \
          --repo ${{ github.repository }}
      shell: bash

    - name: Store compilation cache
      if: inputs.save-ccache == 'true'
      uses: actions/cache/save@v4
      continue-on-error: true
      with:
        path: /ccache-${{ inputs.lib }}
        key: ${{ steps.ccache-key.outputs.main }}${{ steps.ccache-key.outputs.suffix }}
