# Decoder configuration for the two-process decoding-server test
# (test_decoding_server_udp + decoding_server). The server is
# decoder-agnostic: swap `type` / `decoder_custom_args` to run the same test
# against a different decoder.
#
# The identity-matrix H/O/D below (3-bit syndrome, one column per row) must
# stay consistent with the test kernel's block/syndrome size and its expected
# correction (syndrome bit 1 set -> correction bit 1 set).
decoders:
  - id: 0
    type: pymatching
    block_size: 3
    syndrome_size: 3
    H_sparse: [0, -1, 1, -1, 2, -1]
    O_sparse: [0, -1, 1, -1, 2, -1]
    D_sparse: [0, -1, 1, -1, 2, -1]
    decoder_custom_args:
      merge_strategy: smallest_weight
      error_rate_vec: [0.1, 0.1, 0.1]
