# Decoder configuration for the two-process decoding-server test
# (test_decoding_server_udp + decoding_server): the multi_error_lut
# variant, demonstrating that swapping decoders is a config-file change only.
#
# Same identity-matrix H/O/D contract as decoding_server_config.yaml: 3-bit
# syndrome, syndrome bit 1 set -> correction bit 1 set.
decoders:
  - id: 0
    type: multi_error_lut
    block_size: 3
    syndrome_size: 3
    H_sparse: [0, -1, 1, -1, 2, -1]
    O_sparse: [0, -1, 1, -1, 2, -1]
    D_sparse: [0, -1, 1, -1, 2, -1]
    decoder_custom_args:
      lut_error_depth: 1
